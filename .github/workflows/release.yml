name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            artifact_ext: tar.gz
          - os: macos-14
            target: x86_64-apple-darwin
            artifact_ext: tar.gz
          - os: macos-14
            target: aarch64-apple-darwin
            artifact_ext: tar.gz
    steps:
      - uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package (unix)
        if: runner.os != 'Windows'
        run: |
          name="rvisor-${{ github.ref_name }}-${{ matrix.target }}"
          mkdir -p dist
          cp "target/${{ matrix.target }}/release/rvisor" "$name"
          tar -czf "dist/$name.tar.gz" "$name"

      - name: Package (windows)
        if: runner.os == 'Windows'
        run: |
          $name = "rvisor-${{ github.ref_name }}-${{ matrix.target }}"
          New-Item -ItemType Directory -Force dist | Out-Null
          Copy-Item "target\\${{ matrix.target }}\\release\\rvisor.exe" "$name.exe"
          Compress-Archive -Path "$name.exe" -DestinationPath "dist\\$name.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}
          path: dist/*

  release:
    name: Create Release
    runs-on: ubuntu-22.04
    needs: build

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Flatten artifacts
        run: |
          mkdir -p out
          find dist -type f -maxdepth 3 -exec mv {} out/ \;

      - name: Publish
        uses: softprops/action-gh-release@v2
        with:
          files: out/*
